server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:graduateacademiccertificationsystem}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: ${JWT_SECRET:graduate-certificate-system-secret-key-2024-for-hs512-algorithm-minimum-64-bytes}
  expiration: ${JWT_EXPIRATION:900000}

# 阿里云 OSS 配置
oss:
  region: ${OSS_REGION:oss-cn-beijing}
  bucket: ${OSS_BUCKET:luce5in3-buket}
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  base-url: ${OSS_BASE_URL:luce5in3-buket.oss-cn-beijing.aliyuncs.com}
  prefix: ${OSS_PREFIX:graduated/}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}


# 日志配置
logging:
  level:
    com.graduate.certificate: debug
    com.baomidou.mybatisplus: debug
